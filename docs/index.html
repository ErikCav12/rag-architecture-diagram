<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG System Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f6f8; color: #1a1a2e; display: flex; justify-content: center; padding: 40px 16px; }
  .page { max-width: 1100px; width: 100%; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: #555; font-size: 15px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 10px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
</style>
</head>
<body>
<div class="page">
  <h1>System Architecture Diagram</h1>
  <p class="subtitle">GenAI Engineering Assistant RAG Architecture</p>
  <div class="card">
    <svg viewBox="0 0 1020 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', -apple-system, sans-serif" style="width:100%; height:auto;">

      <!-- Background regions -->
      <rect x="20" y="30" width="130" height="580" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
      <text x="85" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#666">USERS</text>

      <rect x="170" y="30" width="180" height="580" rx="12" fill="#e8f4f8" stroke="#b3d9e8" stroke-width="1.5"/>
      <text x="260" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0077b6">APPLICATION LAYER</text>

      <rect x="370" y="30" width="290" height="580" rx="12" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
      <text x="515" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">AI / ORCHESTRATION LAYER</text>

      <rect x="680" y="30" width="320" height="580" rx="12" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
      <text x="840" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">DATA & SECURITY LAYER</text>

      <!-- ==================== -->
      <!-- RAG PHASE DOTTED BOXES -->
      <!-- ==================== -->

      <!-- Ingestion phase box (around Blob Storage) -->
      <rect x="695" y="50" width="190" height="130" rx="8" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="705" y="68" font-size="9" font-weight="700" fill="#2e7d32" letter-spacing="1.5">INGESTION</text>

      <!-- Retrieval phase box (around AI Search) -->
      <rect x="385" y="50" width="270" height="130" rx="8" fill="none" stroke="#e65100" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="395" y="68" font-size="9" font-weight="700" fill="#e65100" letter-spacing="1.5">RETRIEVAL</text>

      <!-- Generation phase box (around Azure OpenAI) -->
      <rect x="385" y="430" width="270" height="130" rx="8" fill="none" stroke="#c62828" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="395" y="448" font-size="9" font-weight="700" fill="#c62828" letter-spacing="1.5">GENERATION</text>

      <!-- ==================== -->
      <!-- COMPONENTS -->
      <!-- ==================== -->

      <!-- User icon -->
      <circle cx="85" cy="290" r="24" fill="#fff" stroke="#495057" stroke-width="2"/>
      <text x="85" y="286" text-anchor="middle" font-size="22">&#128104;&#8205;&#128295;</text>
      <text x="85" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Engineer</text>
      <text x="85" y="345" text-anchor="middle" font-size="9" fill="#666">RBAC Authenticated</text>

      <!-- Web Application (aligned with Orchestrator) -->
      <rect x="185" y="255" width="150" height="70" rx="8" fill="#fff" stroke="#0077b6" stroke-width="2"/>
      <text x="260" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#0077b6">Web Application</text>
      <text x="260" y="297" text-anchor="middle" font-size="10" fill="#555">Azure App Services</text>

      <!-- AI Search (top of AI column) -->
      <rect x="400" y="80" width="240" height="80" rx="8" fill="#fff" stroke="#e65100" stroke-width="2"/>
      <text x="520" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Azure AI Search</text>
      <text x="520" y="122" text-anchor="middle" font-size="10" fill="#555">Hybrid Retrieval</text>

      <!-- Orchestration Engine (middle of AI column) -->
      <rect x="400" y="255" width="240" height="70" rx="8" fill="#fff" stroke="#e65100" stroke-width="2"/>
      <text x="520" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Orchestration Engine</text>
      <text x="520" y="297" text-anchor="middle" font-size="10" fill="#555">Azure Function Apps (Serverless)</text>

      <!-- Azure OpenAI (bottom of AI column) -->
      <rect x="400" y="460" width="240" height="80" rx="8" fill="#fff" stroke="#c62828" stroke-width="2"/>
      <text x="520" y="488" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Azure OpenAI</text>
      <text x="520" y="505" text-anchor="middle" font-size="10" fill="#555">LLM (Data stays in Azure)</text>

      <!-- Blob Storage (aligned with AI Search) -->
      <rect x="710" y="80" width="160" height="80" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
      <text x="790" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Azure Blob Storage</text>
      <text x="790" y="122" text-anchor="middle" font-size="10" fill="#555">Document Corpus</text>

      <!-- Observability phase box (around SQL Database) -->
      <rect x="695" y="230" width="190" height="115" rx="8" fill="none" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="705" y="248" font-size="9" font-weight="700" fill="#7b1fa2" letter-spacing="1.5">OBSERVABILITY</text>

      <!-- SQL Database -->
      <rect x="710" y="255" width="160" height="70" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
      <text x="790" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">SQL Database</text>
      <text x="790" y="297" text-anchor="middle" font-size="10" fill="#555">Logging &amp; Evaluation</text>

      <!-- Security block -->
      <rect x="710" y="380" width="275" height="155" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
      <text x="847" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Security &amp; DevOps</text>
      <text x="730" y="430" font-size="10" fill="#555">&#128274; Azure Active Directory</text>
      <text x="730" y="452" font-size="10" fill="#555">&#128273; Azure Key Vaults</text>
      <text x="730" y="474" font-size="10" fill="#555">&#9881; Azure DevOps + Repos</text>
      <text x="730" y="496" font-size="10" fill="#555">&#128736; CI/CD Pipeline</text>

      <!-- ==================== -->
      <!-- ARROWS — REQUEST FLOW (solid dark) -->
      <!-- ==================== -->

      <!-- User to Web App -->
      <line x1="109" y1="282" x2="181" y2="282" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="145" y="275" text-anchor="middle" font-size="8" fill="#666">Query</text>

      <!-- Web App to Orchestrator -->
      <line x1="335" y1="282" x2="396" y2="282" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="365" y="275" text-anchor="middle" font-size="8" fill="#666">API</text>

      <!-- Orchestrator up to AI Search -->
      <line x1="495" y1="255" x2="495" y2="164" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="480" y="205" font-size="8" fill="#666" text-anchor="end">Search</text>

      <!-- Orchestrator down to Azure OpenAI -->
      <line x1="495" y1="325" x2="495" y2="456" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="480" y="388" font-size="8" fill="#666" text-anchor="end">Chunks</text>
      <text x="480" y="398" font-size="8" fill="#666" text-anchor="end">+ Query</text>

      <!-- Blob Storage to AI Search (indexed) -->
      <line x1="710" y1="120" x2="644" y2="120" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
      <text x="677" y="113" text-anchor="middle" font-size="8" fill="#2e7d32">Indexed</text>

      <!-- Orchestrator to SQL (log) -->
      <line x1="640" y1="290" x2="706" y2="290" stroke="#495057" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <text x="673" y="283" text-anchor="middle" font-size="8" fill="#666">Log</text>

      <!-- ==================== -->
      <!-- ARROWS — RESPONSE FLOW (dashed green) -->
      <!-- ==================== -->

      <!-- AI Search returns chunks to Orchestrator -->
      <line x1="545" y1="160" x2="545" y2="251" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
      <text x="560" y="205" font-size="8" fill="#2e7d32">Chunks</text>

      <!-- Azure OpenAI returns to Orchestrator -->
      <line x1="545" y1="460" x2="545" y2="329" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
      <text x="560" y="388" font-size="8" fill="#2e7d32">Cited</text>
      <text x="560" y="398" font-size="8" fill="#2e7d32">Response</text>

      <!-- Orchestrator back to Web App -->
      <line x1="396" y1="298" x2="339" y2="298" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
      <text x="365" y="310" text-anchor="middle" font-size="8" fill="#2e7d32">Response</text>

      <!-- Web App back to User -->
      <line x1="181" y1="298" x2="113" y2="298" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
      <text x="145" y="310" text-anchor="middle" font-size="8" fill="#2e7d32">Cited Answer</text>

      <!-- ==================== -->
      <!-- LEGEND -->
      <!-- ==================== -->
      <rect x="185" y="540" width="150" height="55" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
      <text x="200" y="558" font-size="9" font-weight="600" fill="#333">Legend</text>
      <line x1="200" y1="570" x2="230" y2="570" stroke="#495057" stroke-width="2"/>
      <text x="235" y="574" font-size="9" fill="#555">Request flow</text>
      <line x1="200" y1="584" x2="230" y2="584" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="235" y="588" font-size="9" fill="#555">Response flow</text>

      <!-- Arrow markers -->
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#495057"/>
        </marker>
        <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>
</body>
</html>
